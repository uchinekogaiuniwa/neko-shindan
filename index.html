  const score={}; Object.keys(CATS).forEach(k=>score[k]=0);
  answers.forEach((ai,qi)=>{ QUESTIONS[qi].a[ai].v.forEach((k,idx)=> score[k]+= (idx===0?2:1)); });
  // tie-break: 出現順（CATS定義順）で安定化
  let best=null;
  Object.keys(CATS).forEach(k=>{ if(best===null || score[k]>score[best]) best=k; });
  return {key:best, score};
}

function showResult(){ renderResult(calc().key); }

function renderResult(key){
  const c=CATS[key];
  const base=location.origin+location.pathname;
  const url=base+'?r='+key;                       // 結果つきURL（開くとこの猫種を直接表示）
  const shareText=`私の性格にピッタリの猫種は【${c.name}】でした🐱（日本の人気 第${RANK[key]}位！）\nあなたはどの猫ちゃん？`;
  const xURL=`https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(url)}&hashtags=${encodeURIComponent(CONFIG.HASHTAG)}`;
  const lineURL=`https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(url)}`;
  const ch = CONFIG.CHANNEL_URL ? `<a class="chlink" href="${CONFIG.CHANNEL_URL}" target="_blank" rel="noopener">${CONFIG.CHANNEL_CTA||('▶ '+CONFIG.CHANNEL_NAME+'を見る')}</a>` : '';
  $('result').innerHTML = `
    <div class="lead">あなたにピッタリの猫種（ねこしゅ）は…</div>
    <div class="catwrap">${catSVG(c.color,140)}</div>
    <div class="name">${c.name}</div>
    <div class="copy">「${c.copy}」</div>
    <div class="rank">🏆 日本でお迎えされている人気猫種 <b>第${RANK[key]}位</b></div>
    <div class="sec2">
      <h3>🧑 あなたはこんな人</h3><p>${c.you}</p>
      <h3>🐱 だから、この猫ちゃん</h3><p>${c.cat}</p>
      <div class="match"><span class="mc">${catSVG(c.color,46)}</span><span class="mt"><b>仲良くなるヒント</b><br>${c.tip}</span></div>
    </div>
    <div class="share-h">▼ 結果をシェアしよう ▼</div>
    <div class="btns">
      <button class="btn btn-x" onclick="window.open('${xURL}','_blank')">𝕏 でシェア</button>
      <button class="btn btn-line" onclick="window.open('${lineURL}','_blank')">LINEでシェア</button>
      <button class="btn btn-sub" id="copyBtn">🔗 結果リンクをコピー</button>
      <button class="btn btn-blue" id="retryBtn">自分の猫種を診断する 🐾</button>
    </div>
    ${ch}`;
  show('result');
  $('retryBtn').onclick=()=>{ history.replaceState(null,'',location.pathname); show('start'); };
  $('copyBtn').onclick=()=>{
    const done=()=>{$('copyBtn').textContent='✓ コピーしました';};
    if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(url).then(done,()=>prompt('このURLをコピーしてください',url)); }
    else { prompt('このURLをコピーしてください',url); }
  };
}

/* 共有リンク（?r=猫種コード）で開かれたら、その結果を直接表示 */
(function(){ const rk=new URLSearchParams(location.search).get('r'); if(rk && CATS[rk]) renderResult(rk); })();
</script>
